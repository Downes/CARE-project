services:
  care:
    build: .
    container_name: care
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3002
      - DATA_DIR=/data
    volumes:
      - ./data:/data        # persistent SQLite DB + Helia blockstore
    # --- Reverse proxy setup (e.g. Caddy) ---
    # Uncomment the network below and remove ports: if using a reverse proxy
    # that shares a Docker network called "web".
    networks:
      - web
    # --- Standalone setup ---
    # Uncomment ports: and remove/comment the networks: block above
    # if running without a reverse proxy.
    # ports:
    #   - "3002:3002"
    # --- IPFS network mode ---
    # If IPFS_ANNOUNCE_IP is set in .env, also expose port 4001 and open it
    # in your firewall so the node can participate in the public IPFS network.
    # ports:
    #   - "4001:4001"
    #   - "4001:4001/udp"

networks:
  web:
    external: true
